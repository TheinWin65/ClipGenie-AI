<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>AI Photo Editor - ClipGenie</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; max-width: 600px; margin: auto; text-align: center; }
        input[type="file"] { margin: 20px 0; display: block; margin-left: auto; margin-right: auto; }
        button { background: #3b82f6; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .result-area { margin-top: 30px; padding: 20px; border-top: 1px solid #334155; }
        img { max-width: 100%; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>AI Background Removal</h2>
    <p>ပုံကိုတင်ပြီး နောက်ခံဖျက်လိုက်ပါ</p>
    
    <form action="/photo-edit" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept="image/*" required>
        <button type="submit">AI ဖြင့် စတင်ဖျက်မည်</button>
    </form>

    {% if result_image %}
    <div class="result-area">
        <h3>ရလဒ် (Background ဖျက်ပြီး)</h3>
        <img src="{{ url_for('static', filename='processed/' + result_image) }}" alt="Result">
        <br><br>
        <a href="/dashboard"><button style="background: #64748b;">Dashboard သို့ ပြန်သွားမည်</button></a>
    </div>
    {% endif %}
</div>

</body>
</html>
