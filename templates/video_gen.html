<!DOCTYPE html>
<html>
<head>
    <title>AI Video Generator</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; max-width: 600px; margin: auto; }
        textarea { width: 100%; height: 100px; margin-top: 10px; border-radius: 5px; }
        button { background: #3b82f6; border: none; padding: 10px 20px; border-radius: 5px; color: white; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎥 AI Video Generation</h1>
        <p>သင်ဖန်တီးချင်သော ဗီဒီယိုအကြောင်းကို ရိုက်ထည့်ပါ:</p>
        <textarea placeholder="ဥပမာ - A beautiful sunset over the mountains..."></textarea>
        <br>
        <button onclick="alert('AI ဗီဒီယို ဖန်တီးမှု စတင်ပါပြီ!')">Create Video</button>
        <br><br>
        <a href="/">🔙 Dashboard သို့ပြန်သွားရန်</a>
    </div>
</body>
</html>
