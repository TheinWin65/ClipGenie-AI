<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipGenie AI Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; }
        input { width: 80%; padding: 10px; margin-top: 10px; border-radius: 5px; border: none; }
        button { background: #3b82f6; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        a { text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>ClipGenie AI Dashboard</h1>
    <p>သင်အသုံးပြုလိုသော ဝန်ဆောင်မှုကို ရွေးချယ်ပါ</p>

    <div class="grid">
        <div class="card">
            <h3>🔗 Link Videos</h3>
            <p>YouTube Link မှ ဗီဒီယိုများကို အနှစ်ချုပ်ခြင်း</p>
            <form action="/analyze" method="POST">
                <input type="text" name="video_url" placeholder="YouTube URL..." required>
                <br>
                <button type="submit">Analyze</button>
            </form>
        </div>

        <div class="card">
            <h3>🎥 AI Video Generation</h3>
            <p>Text သို့မဟုတ် Image မှ AI ဗီဒီယိုအသစ် ဖန်တီးပေးခြင်း</p>
            <a href="/video-gen"><button>Create Video</button></a>
        </div>

        <div class="card">
            <h3>🖼️ AI Photo Editing</h3>
            <p>AI ကိုသုံး၍ ပုံများကို ပြင်ဆင်ခြင်းနှင့် ဖန်တီးခြင်း</p>
            <a href="/photo-edit"><button>Edit Photo</button></a>
        </div>
    </div>
</div>

</body>
</html>
