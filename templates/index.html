<!DOCTYPE html>
<html>
<head>
    <title>ClipGenie AI</title>
</head>
<body>
    <h1>ClipGenie AI</h1>
    <input type="text" id="user_input" placeholder="လင့်ခ် သို့ စာရိုက်ပါ">
    <button onclick="sendMessage()">Send</button>
    <p id="result"></p> <h3>History:</h3>
    <div id="history"></div>

    <script>
    function sendMessage() {
        const message = document.getElementById('user_input').value;
        fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: message})
        })
        .then(response => response.json())
        .then(data => {
            // အဖြေကို result ဆိုတဲ့ ID ရှိတဲ့ နေရာမှာ ပြမယ်
            document.getElementById('result').innerText = data.response;
        })
        .catch(error => {
            document.getElementById('result').innerText = "Error ဖြစ်နေပါတယ်...";
        });
    }
</script>
