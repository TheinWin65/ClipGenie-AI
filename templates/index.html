<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>ClipGenie AI Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; padding: 20px; }
        .dashboard-card { background: #1e293b; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; }
        .credit-badge { background: #3b82f6; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .input-group { margin: 20px 0; }
        input { width: 100%; padding: 10px; border-radius: 5px; border: none; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard-card">
    <h3>လှိုက်လှဲစွာကြိုဆိုပါတယ်!</h3>
    <p>သင်၏ လက်ကျန် Credit: <span class="credit-badge">{{ credit }}</span></p>

    <div class="input-group">
        <form action="/analyze" method="POST">
            <input type="text" name="youtube_url" placeholder="YouTube Video Link ကို ထည့်ပါ" required>
            <button type="submit">AI ဖြင့် ခွဲခြမ်းစိတ်ဖြာမည် (Analyze)</button>
        </form>
    </div>
</div>

</body>
</html>
