<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>ClipGenie AI Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; margin: 0; padding-bottom: 80px; }
        .header { text-align: right; padding: 15px; }
        .credit-box { background: #334155; padding: 10px; border-radius: 10px; margin: 10px auto; width: fit-content; }
        .container { max-width: 800px; margin: auto; padding: 20px; text-align: center; }
        .nav-item { color: #94a3b8; text-decoration: none; font-size: 12px; text-align: center; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1e293b; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; }
    </style>
</head>
<body>

<div class="header">
    <a href="/login" style="color: #3b82f6; text-decoration: none;">Login / Sign In</a>
</div>

<div class="container">
    <h1>ClipGenie AI</h1>
    <div class="credit-box">
        သင်၏ လက်ကျန် Credit: <span style="color: #3b82f6; font-weight: bold;">{{ credit }}</span>
    </div>
    <p>သင်အသုံးပြုလိုသော ဝန်ဆောင်မှုကို ရွေးချယ်ပါ</p>
    </div>

<div class="bottom-nav">
    <a href="/" class="nav-item">🏠<br>Home</a>
    <a href="/video-gen" class="nav-item">🎥<br>Create</a>
    <a href="/photo-edit" class="nav-item">🖼️<br>Edit</a>
    <a href="/history" class="nav-item">📜<br>History</a>
</div>

</body>
</html>
