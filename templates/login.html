<!DOCTYPE html>
<html>
<body>
    <h1>Background Remover</h1>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Remove Background</button>
    </form>
    {% if result_image %}
        <img src="data:image/png;base64,{{ result_image }}">
    {% endif %}
</body>
</html>
