<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>ClipGenie AI - Login</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 15px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background: #3b82f6; width: 100%; padding: 10px; border: none; border-radius: 5px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Login</h2>
    <form action="/login" method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
