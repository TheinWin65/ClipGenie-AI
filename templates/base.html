<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipGenieAI - Video Intelligence</title>
    <style>
        /* Dark Mode Styling */
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
        }
        .navbar {
            background-color: #1e293b;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #334155;
        }
        .nav-links a {
            color: #f1f5f9;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }
        .btn-primary {
            background-color: #8b5cf6;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
        }
        .container {
            padding: 2rem;
            max-width: 900px;
            margin: auto;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div style="font-size: 1.5rem; font-weight: bold; color: #8b5cf6;">ClipGenieAI</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/history">History</a>
            <a href="/" class="btn-primary">New Chat</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
