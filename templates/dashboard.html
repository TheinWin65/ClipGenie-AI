<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>ClipGenie AI Dashboard</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; padding: 20px; }
        .container { max-width: 900px; margin: auto; text-align: center; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; }
        .credit-badge { background: #3b82f6; padding: 5px 15px; border-radius: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h3>လှိုက်လှဲစွာကြိုဆိုပါတယ်!</h3>
    <p>သင်၏ လက်ကျန် Credit: <span class="credit-badge">{{ credit }}</span></p>

    <div class="dashboard-grid">
        <div class="card">
            <h4>Link Videos</h4>
            <form action="/analyze" method="POST">
                <input type="text" name="youtube_url" placeholder="YouTube Link ထည့်ပါ" required>
                <button type="submit">Analyze</button>
            </form>
        </div>

        <div class="card">
            <h4>AI Video Generation</h4>
            <p>Text မှ AI ဗီဒီယို ဖန်တီးရန်</p>
            <a href="/video-gen"><button>ဖန်တီးမည်</button></a>
        </div>

        <div class="card">
            <h4>AI Photo Editing</h4>
            <p>AI သုံး၍ ပုံများပြင်ဆင်ရန်</p>
            <a href="/photo-edit"><button>ပြင်ဆင်မည်</button></a>
        </div>
    </div>
</div>

</body>
</html>
